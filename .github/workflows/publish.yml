name: Publish
# PyPI setup required before first use:
# 1. Create the `deep-learning-wandb` project on PyPI.
# 2. Add a Trusted Publisher for:
#    - owner: Blazkowiz47
#    - repository: dl-wandb
#    - workflow: publish.yml
#    - environment: dl-wandb
# 3. Create the `dl-wandb` GitHub environment if you want approval gates.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Create virtual environment
        run: uv venv

      - name: Install test dependencies
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import tomllib

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          dependencies = [
              dependency
              for dependency in pyproject["project"]["dependencies"]
              if not dependency.startswith("deep-learning-core")
          ]
          dev_dependencies = pyproject["project"]["optional-dependencies"]["dev"]
          Path("requirements-ci.txt").write_text(
              "\n".join(
                  [
                      *dependencies,
                      *dev_dependencies,
                      "albumentations",
                      "numpy",
                      "psutil",
                      "scikit-learn",
                      "torch",
                      "tqdm",
                      "twine",
                  ]
              )
              + "\n",
              encoding="utf-8",
          )
          PY
          uv pip install --python .venv/bin/python -r requirements-ci.txt
          uv cache clean
          uv pip install --python .venv/bin/python --no-deps deep-learning-core
          uv pip install --python .venv/bin/python --no-deps --editable .

      - name: Run tests
        run: .venv/bin/python -m pytest

      - name: Build distribution artifacts
        run: uv build --no-sources

      - name: Check distribution metadata
        run: .venv/bin/python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish To PyPI
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      id-token: write

    environment:
      name: dl-wandb
      url: https://pypi.org/p/deep-learning-wandb

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
